<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Deep Research | Digital Archivist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#c7c5d0",
              "primary-fixed": "#e1e0ff",
              "on-tertiary": "#3c2f00",
              "tertiary-fixed": "#fee089",
              "on-error": "#690005",
              "primary-container": "#c0c1ff",
              "inverse-surface": "#e5e1e4",
              "on-surface": "#e5e1e4",
              "surface": "#131315",
              "on-tertiary-fixed": "#231b00",
              "inverse-primary": "#585990",
              "surface-variant": "#353437",
              "secondary": "#c1c1ff",
              "secondary-fixed": "#e1e0ff",
              "primary": "#e1dfff",
              "on-tertiary-container": "#645003",
              "on-primary-container": "#4b4d83",
              "error": "#ffb4ab",
              "surface-container-lowest": "#0e0e10",
              "on-background": "#e5e1e4",
              "background": "#131315",
              "primary-fixed-dim": "#c0c1ff",
              "tertiary": "#fee089",
              "on-primary": "#292b5e",
              "surface-dim": "#131315",
              "on-secondary-fixed-variant": "#3333b0",
              "surface-container-high": "#2a2a2c",
              "tertiary-fixed-dim": "#e0c470",
              "error-container": "#93000a",
              "surface-bright": "#39393b",
              "tertiary-container": "#e0c470",
              "on-secondary-container": "#acaeff",
              "surface-tint": "#c0c1ff",
              "on-primary-fixed": "#131449",
              "on-secondary": "#19129a",
              "inverse-on-surface": "#303032",
              "outline-variant": "#46464f",
              "on-tertiary-fixed-variant": "#574500",
              "surface-container-highest": "#353437",
              "outline": "#918f9a",
              "on-primary-fixed-variant": "#404176",
              "surface-container-low": "#1b1b1d",
              "secondary-fixed-dim": "#c1c1ff",
              "on-secondary-fixed": "#07006c",
              "surface-container": "#1f1f21",
              "secondary-container": "#3333b0",
              "on-error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #131315;
            color: #e5e1e4;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .obsidian-spotlight {
            background: radial-gradient(circle at 50% 40%, rgba(192, 193, 255, 0.08) 0%, rgba(19, 19, 21, 0) 60%);
        }
        .glass-panel {
            background: rgba(53, 52, 55, 0.7);
            backdrop-filter: blur(40px);
        }
        .ghost-border {
            outline: 1px solid rgba(70, 70, 79, 0.15);
        }
        .tight-display {
            letter-spacing: -0.04em;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden">
<!-- TopNavBar (Shared Component) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-4 bg-[#131315]/70 backdrop-blur-xl">
<div class="text-xl font-bold tracking-tighter text-[#c0c1ff]">
            Deep Research
        </div>
<nav class="flex items-center gap-6">
<button class="text-[#c7c5d0] hover:text-[#e5e1e4] transition-colors duration-200 active:scale-95 transition-transform flex items-center">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="text-[#c7c5d0] hover:text-[#e5e1e4] transition-colors duration-200 active:scale-95 transition-transform flex items-center">
<span class="material-symbols-outlined" data-icon="history">history</span>
</button>
<button class="text-[#c7c5d0] hover:text-[#e5e1e4] transition-colors duration-200 active:scale-95 transition-transform flex items-center">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
</button>
<button class="text-[#c7c5d0] hover:text-[#e5e1e4] transition-colors duration-200 active:scale-95 transition-transform flex items-center">
<span class="material-symbols-outlined" data-icon="code">code</span>
</button>
</nav>
</header>
<!-- SideNavBar (Suppressed for landing state based on Filter Rules) -->
<main class="flex-grow flex flex-col items-center justify-center relative obsidian-spotlight pt-20 px-6">
<!-- Hero Section -->
<div class="w-full max-w-4xl flex flex-col items-center text-center space-y-12">
<h1 class="font-headline text-[2.75rem] md:text-[3.5rem] font-bold tight-display text-on-surface leading-tight">
                What would you like to research?
            </h1>
<!-- Search Container -->
<div class="w-full space-y-6">
<div class="relative group">
<div class="glass-panel rounded-xl p-2 pl-6 flex items-center shadow-2xl transition-all duration-300 group-focus-within:bg-primary/5">
<span class="material-symbols-outlined text-on-surface-variant mr-4" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 text-lg w-full placeholder:text-on-surface-variant/50 text-on-surface" placeholder="Enter a topic, question, or URL..." type="text"/>
<button class="bg-gradient-to-r from-[#c0c1ff] to-[#8083ff] text-on-primary px-8 py-3 rounded-lg font-bold hover:opacity-90 transition-opacity whitespace-nowrap active:scale-95">
                            Start Research
                        </button>
</div>
</div>
<!-- Action Row -->
<div class="flex flex-wrap items-center justify-center gap-4 text-sm font-medium">
<button class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container hover:bg-surface-container-high transition-colors ghost-border">
<span class="material-symbols-outlined text-sm" data-icon="attach_file">attach_file</span>
<span>Attach files</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container hover:bg-surface-container-high transition-colors ghost-border">
<span class="material-symbols-outlined text-sm" data-icon="library_books">library_books</span>
<span>Knowledge Base</span>
</button>
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-primary-container/10 text-primary-fixed-dim ghost-border">
<span class="material-symbols-outlined text-sm" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span>Claude 3.5 Sonnet</span>
</div>
</div>
</div>
<!-- Suggestion Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full pt-4">
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container text-left hover:bg-surface-container-high transition-all ghost-border group">
<span class="text-on-surface-variant text-xs uppercase tracking-wider mb-2 font-bold">Analysis</span>
<p class="text-on-surface font-medium leading-snug group-hover:text-primary transition-colors">Market analysis of the solid-state battery industry 2024</p>
</button>
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container text-left hover:bg-surface-container-high transition-all ghost-border group">
<span class="text-on-surface-variant text-xs uppercase tracking-wider mb-2 font-bold">Scientific</span>
<p class="text-on-surface font-medium leading-snug group-hover:text-primary transition-colors">Climate change impact on deep-sea thermal vents</p>
</button>
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container text-left hover:bg-surface-container-high transition-all ghost-border group">
<span class="text-on-surface-variant text-xs uppercase tracking-wider mb-2 font-bold">Historical</span>
<p class="text-on-surface font-medium leading-snug group-hover:text-primary transition-colors">History of Byzantine architecture and its influence</p>
</button>
</div>
</div>
<!-- Workflow Progress Bar -->
<div class="mt-auto w-full max-w-2xl pb-12 opacity-40">
<div class="flex items-center justify-between relative px-2">
<!-- Line -->
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-outline-variant -translate-y-1/2 z-0"></div>
<!-- Steps -->
<div class="flex flex-col items-center gap-2 z-10 bg-surface px-2">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">Topic</span>
</div>
<div class="flex flex-col items-center gap-2 z-10 bg-surface px-2">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">Questions</span>
</div>
<div class="flex flex-col items-center gap-2 z-10 bg-surface px-2">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">Plan</span>
</div>
<div class="flex flex-col items-center gap-2 z-10 bg-surface px-2">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">Research</span>
</div>
<div class="flex flex-col items-center gap-2 z-10 bg-surface px-2">
<div class="w-2.5 h-2.5 rounded-full bg-outline-variant"></div>
<span class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant">Report</span>
</div>
</div>
</div>
</main>
<!-- Visual Accents (Editorial Texture) -->
<div class="fixed bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-surface-container-lowest to-transparent pointer-events-none opacity-50"></div>
<div class="fixed top-1/4 -left-20 w-96 h-96 bg-primary-container/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-1/4 -right-20 w-96 h-96 bg-secondary-container/5 blur-[120px] rounded-full pointer-events-none"></div>
</body></html>
